name: MATLAB CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Run MATLAB Tests & Static Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    # Sets up MATLAB on the GitHub Actions runner
    - name: Set up MATLAB
      uses: matlab-actions/setup-matlab@v1

    # Check for syntax errors and warnings in all MATLAB files
    - name: Run Code Analyzer (Linter)
      uses: matlab-actions/run-command@v1
      with:
        command: |
          files = dir('src/*.m');
          anyIssues = false;
          for k = 1:length(files)
              filePath = fullfile(files(k).folder, files(k).name);
              diags = checkcode(filePath);
              if ~isempty(diags)
                  anyIssues = true;
                  fprintf('Issues found in %s:\n', files(k).name);
                  disp(struct2table(diags));
              end
          end
          if anyIssues
              error('Code Analyzer found issues in one or more files.');
          else
              disp('All code passed checkcode diagnostics.');
          end

    # Run tests in the tests/ directory
    - name: Run Tests
      uses: matlab-actions/run-tests@v1
      with:
        select-by-folder: tests
